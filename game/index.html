<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trailer Park Dash</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0b1220;
  font-family: Arial;
}

canvas {
  display: block;
  margin: auto;
  touch-action: none;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 18px;
  z-index: 5;
}

.overlay {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  color: white;
  z-index: 10;
}

button {
  padding: 10px 16px;
  font-size: 16px;
}

/* 🎮 LEGEND (NEW) */
#legend {
  position: absolute;
  top: 60px;
  left: 10px;
  width: 260px;
  background: #0b1117;
  border: 1px solid #2b3a4a;
  padding: 12px;
  color: #d7dde5;
  font-family: Courier New, monospace;
  font-size: 12px;
  z-index: 6;
  opacity: 0.95;
}
</style>
</head>

<body>

<!-- HUD -->
<div id="hud">Score: 0</div>

<!-- 🎮 LEGEND -->
<div id="legend">
<b style="font-size:14px; color:#e2e8f0;">GAME BRIEFING</b><br><br>

<b>INSTRUCTIONS:</b><br>
Use arrow keys to navigate between trailers.<br><br>

<b>SCORING:</b><br>
Roadkill = <b style="color:#4ade80;">+5 points</b><br>
Beer = <b style="color:#fbbf24;">+1 point</b><br><br>

<b>HAZARD:</b><br>
Hit Rabid Raccoon = <b style="color:#ff4d4d;">GAME OVER</b><br><br>

<b>OBJECTIVE:</b><br>
Survive and maximize your score.
</div>

<!-- START SCREEN -->
<div id="startScreen" class="overlay">

  <div style="max-width:500px;">

    <h1>🍺 TRAILER PARK DASH</h1>

    <div id="bootText" style="
      font-family: Courier New, monospace;
      font-size: 14px;
      margin-top: 20px;
      color: #cfd8e3;
      min-height: 120px;
    ">
    INITIALIZING SYSTEM...
    </div>

    <button id="startBtn" onclick="startGame()" style="display:none;">
      INITIALIZE SIMULATION
    </button>

  </div>

</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="overlay" style="display:none;">
  <h1>💀 GAME OVER</h1>
  <p id="finalScore"></p>
  <button onclick="location.reload()">Restart</button>
</div>

<!-- CANVAS -->
<canvas id="game" width="420" height="650"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ---------------- STATE ---------------- */

let running = false;
let gameOver = false;

let score = 0;

let player = { x: 190, y: 540 };
let targetX = 190;

let beers = [];
let campers = [];
let deer = [];
let raccoons = [];

let speed = 2;
let difficulty = 1;

let shake = 0;
let flash = 0;
let slowTimer = 0;

/* ---------------- INPUT ---------------- */

document.addEventListener("keydown", (e) => {
  if (!running || gameOver) return;

  let move = slowTimer > 0 ? 14 : 22;

  if (e.key === "ArrowLeft") targetX -= move;
  if (e.key === "ArrowRight") targetX += move;

  targetX = Math.max(0, Math.min(380, targetX));
});

/* ---------------- SPAWN ---------------- */

function spawn() {
  if (Math.random() < 0.03) beers.push({ x: Math.random()*380, y: -20 });
  if (Math.random() < 0.02) campers.push({ x: Math.random()*380, y: -20 });
  if (Math.random() < 0.003) deer.push({ x: Math.random()*380, y: -20 });

  if (Math.random() < (0.0015 + difficulty * 0.0009)) {
    raccoons.push({
      x: Math.random()*380,
      y: -20,
      dir: Math.random() < 0.5 ? -1 : 1
    });
  }
}

/* ---------------- COLLISION ---------------- */

function hit(a,b){
  return (
    a.x < b.x + 30 &&
    a.x + 30 > b.x &&
    a.y < b.y + 30 &&
    a.y + 30 > b.y
  );
}

/* ---------------- GAME OVER ---------------- */

function endGame() {
  gameOver = true;
  running = false;

  document.getElementById("finalScore").innerText =
    "Final Score: " + score;

  document.getElementById("gameOverScreen").style.display = "block";
}

/* ---------------- UPDATE ---------------- */

function update() {
  if (!running || gameOver) return;

  if (slowTimer > 0) slowTimer--;

  speed += 0.0014 * difficulty;
  difficulty += 0.0007;

  player.x += (targetX - player.x) * 0.28;

  beers.forEach(b => b.y += speed + 1);
  campers.forEach(c => c.y += speed + 1.2);
  deer.forEach(d => d.y += speed + 0.9);

  raccoons.forEach(r => {
    r.y += speed + 1.5;
    r.x += r.dir * (3 + difficulty * 0.6);

    if (Math.random() < 0.04) r.dir *= -1;

    if (r.x < 0) { r.x = 0; r.dir = 1; }
    if (r.x > 380) { r.x = 380; r.dir = -1; }
  });

  beers.forEach((b,i)=>{
    if(hit(player,b)){
      beers.splice(i,1);
      score += 1;
      updateHUD();
    }
  });

  campers.forEach((c,i)=>{
    if(hit(player,c)){
      campers.splice(i,1);
      slowTimer = 80;
    }
  });

  deer.forEach((d,i)=>{
    if(hit(player,d)){
      deer.splice(i,1);
      score += 5;
      updateHUD();
    }
  });

  raccoons.forEach((r,i)=>{
    if(hit(player,r)){
      raccoons.splice(i,1);
      endGame();
    }
  });

  spawn();
}

/* ---------------- DRAW ---------------- */

function draw() {
  ctx.clearRect(0,0,420,650);

  ctx.fillStyle="#1f6b2d";
  ctx.fillRect(0,0,420,650);

  ctx.fillStyle="#2b2b2b";
  ctx.fillRect(110,0,200,650);

  ctx.font="40px Arial";
  ctx.textAlign="center";

  ctx.fillText("🧍‍♂️",player.x,player.y);

  beers.forEach(b=>ctx.fillText("🍺",b.x,b.y));
  campers.forEach(c=>ctx.fillText("🚐",c.x,c.y));
  deer.forEach(d=>ctx.fillText("🦌",d.x,d.y));
  raccoons.forEach(r=>ctx.fillText("🦝",r.x,r.y));

  if(flash>0){
    ctx.fillStyle="rgba(255,255,255,0.08)";
    ctx.fillRect(0,0,420,650);
    flash--;
  }
}

/* ---------------- LOOP ---------------- */

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ---------------- UI ---------------- */

function updateHUD(){
  document.getElementById("hud").innerText="Score: "+score;
}

function startGame(){
  document.getElementById("startScreen").style.display="none";
  running=true;
  updateHUD();
}

loop();
</script>

</body>
</html>
