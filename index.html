<script>
function checkAccess() {

    const code = document.getElementById("caseNumber").value;
    const box = document.getElementById("responseBox");

    if (!box) {
        alert("SYSTEM ERROR: RESPONSE BOX MISSING");
        return;
    }

    if (code === "79243") {

        box.innerText = "SYSTEM RESPONSE: AUTHORIZATION CONFIRMED";

        setTimeout(() => {
            window.location.href = "Case-Archive.html";
        }, 1500);

    } else {

        box.innerText = "SYSTEM RESPONSE: ACCESS DENIED — INVALID CODE";

        setTimeout(() => {
            box.innerText = "SYSTEM RESPONSE: Awaiting input...";
        }, 2000);
    }
}
</script>
