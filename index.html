<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trash Panda Snack Dash</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#2c3e50, #1b2836);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

canvas {
  display: block;
  margin: 0 auto;
  background: linear-gradient(#34495e, #22313f);
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 18px;
}

#startScreen, #gameOverScreen {
  position: absolute;
  width: 100%;
  top: 35%;
  text-align: center;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="hud">Score: 0 ❤️❤️❤️</div>

<div id="startScreen">
  <h1>🦝 Trash Panda Snack Dash</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="gameOverScreen" style="display:none;">
  <h1>Game Over 🦝</h1>
  <button onclick="startGame()">Play Again</button>
</div>

<canvas id="game" width="420" height="650"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, items, obstacles;
let score, lives, running;

function reset() {
  player = { x: 190, y: 540, w: 40, h: 40, speed: 6 };
  items = [];
  obstacles = [];
  score = 0;
  lives = 3;
  running = true;
  updateHUD();
}

document.addEventListener("keydown", e => {
  if (!running) return;
  if (e.key === "ArrowLeft") player.x -= player.speed;
  if (e.key === "ArrowRight") player.x += player.speed;

  player.x = Math.max(0, Math.min(380, player.x));
});

function updateHUD() {
  document.getElementById("hud").innerText =
    `Score: ${score} ❤️`.repeat(lives).replace("Score: 0 ❤️Score: 0 ❤️Score: 0 ❤️", `Score: ${score} ❤️❤️❤️`);
}

function spawnItem() {
  const types = ["trash", "food"];
  const type = types[Math.floor(Math.random() * types.length)];

  items.push({
    x: Math.random() * 380,
    y: -20,
    w: 22,
    h: 22,
    speed: 2.2,
    type
  });
}

function spawnObstacle() {
  obstacles.push({
    x: Math.random() * 380,
    y: -20,
    w: 35,
    h: 35,
    speed: 2.6
  });
}

function collision(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function playNom() {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audio = new AudioCtx();

  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.type = "triangle";
  osc.frequency.value = 300;

  gain.gain.value = 0.08;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();
  osc.stop(audio.currentTime + 0.12);
}

function update() {
  if (!running) return;

  // move objects
  items.forEach(i => i.y += i.speed);
  obstacles.forEach(o => o.y += o.speed);

  // collect items
  items.forEach((i, index) => {
    if (collision(player, i)) {
      score += (i.type === "food") ? 2 : 1;
      playNom();
      items.splice(index, 1);
      updateHUD();
    }
  });

  // obstacles
  obstacles.forEach(o => {
    if (collision(player, o)) {
      lives--;
      obstacles.splice(obstacles.indexOf(o), 1);

      if (lives <= 0) endGame();
      updateHUD();
    }
  });

  items = items.filter(i => i.y < 700);
  obstacles = obstacles.filter(o => o.y < 700);

  if (Math.random() < 0.03) spawnItem();
  if (Math.random() < 0.02) spawnObstacle();
}

function drawRaccoon() {
  // body
  ctx.fillStyle = "#7f8c8d";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // mask
  ctx.fillStyle = "#2c3e50";
  ctx.fillRect(player.x + 6, player.y + 10, 10, 8);
  ctx.fillRect(player.x + 24, player.y + 10, 10, 8);

  // eyes glow
  ctx.fillStyle = "white";
  ctx.fillRect(player.x + 10, player.y + 12, 3, 3);
  ctx.fillRect(player.x + 27, player.y + 12, 3, 3);
}

function drawItems() {
  items.forEach(i => {
    ctx.fillStyle = i.type === "food" ? "#f1c40f" : "#27ae60";
    ctx.fillRect(i.x, i.y, i.w, i.h);
  });
}

function drawObstacles() {
  ctx.fillStyle = "#e74c3c";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawRaccoon();
  drawItems();
  drawObstacles();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameOverScreen").style.display = "none";
  reset();
}

function endGame() {
  running = false;
  document.getElementById("gameOverScreen").style.display = "block";
}

loop();
</script>

</body>
</html>
