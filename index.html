<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Brew Run: Neon Alley</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
  text-align: center;
}

canvas {
  display: block;
  margin: 0 auto;
  background: linear-gradient(#050914, #0b1a2a 60%, #050914);
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 18px;
  z-index: 10;
}

#startScreen, #gameOverScreen {
  position: absolute;
  width: 100%;
  top: 35%;
  z-index: 20;
}

button {
  padding: 10px 16px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="hud">Score: 0</div>

<div id="startScreen">
  <h1>🌃 Brew Run: Neon Alley</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="gameOverScreen" style="display:none;">
  <h1>Game Over</h1>
  <button onclick="startGame()">Restart</button>
</div>

<canvas id="game" width="420" height="650"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, bottles, water, score, running;
let speed = 2;
let shake = 0;
let frame = 0;

// neon alley lights (background objects)
let lights = [];

function reset() {
  player = { x: 190, y: 540 };
  bottles = [];
  water = [];
  score = 0;
  speed = 2;
  running = true;
  shake = 0;
  frame = 0;

  lights = Array.from({length: 6}, (_, i) => ({
    x: i * 70,
    y: Math.random() * 650,
    glow: Math.random() * 1
  }));

  updateHUD();
}

function updateHUD() {
  document.getElementById("hud").innerText = "Score: " + score;
}

// controls
document.addEventListener("keydown", e => {
  if (!running) return;
  if (e.key === "ArrowLeft") player.x -= 6;
  if (e.key === "ArrowRight") player.x += 6;
  player.x = Math.max(0, Math.min(380, player.x));
});

// mobile
document.addEventListener("touchstart", e => {
  player.x = e.touches[0].clientX - 20;
});

function spawn() {
  if (Math.random() < 0.05) {
    bottles.push({ x: Math.random()*380, y: -20 });
  }
  if (Math.random() < 0.03) {
    water.push({ x: Math.random()*380, y: -20 });
  }
}

function collision(a,b){
  return a.x < b.x+30 &&
         a.x+30 > b.x &&
         a.y < b.y+30 &&
         a.y+30 > b.y;
}

function beep(freq){
  const a = new (window.AudioContext||window.webkitAudioContext)();
  const o = a.createOscillator();
  const g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.frequency.value = freq;
  g.gain.value = 0.05;
  o.start();
  o.stop(a.currentTime+0.08);
}

// screen shake
function applyShake(){
  if(shake>0){
    ctx.setTransform(1,0,0,1,(Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
    shake *= 0.9;
  } else {
    ctx.setTransform(1,0,0,1,0,0);
  }
}

// neon background
function drawBackground(){
  // alley floor glow
  ctx.fillStyle = "#06101d";
  ctx.fillRect(0,0,420,650);

  // moving light strips
  lights.forEach(l=>{
    ctx.fillStyle = `rgba(0,255,255,${0.05 + l.glow})`;
    ctx.fillRect(l.x, l.y, 10, 80);

    l.y += speed * 0.5;
    if(l.y>650) l.y = -80;
  });

  // center lane highlight
  ctx.fillStyle = "rgba(255,255,255,0.03)";
  ctx.fillRect(180,0,60,650);
}

function update(){
  if(!running) return;

  frame++;
  speed += 0.002;

  bottles.forEach(b=>b.y+=speed+1.2);
  water.forEach(w=>w.y+=speed+1.5);

  bottles.forEach((b,i)=>{
    if(collision(player,b)){
      score++;
      beep(600);
      bottles.splice(i,1);
      updateHUD();
    }
  });

  water.forEach((w,i)=>{
    if(collision(player,w)){
      water.splice(i,1);
      shake = 12;
      beep(120);
    }
  });

  bottles = bottles.filter(b=>b.y<700);
  water = water.filter(w=>w.y<700);

  spawn();
}

function drawPlayer(){
  ctx.font = "32px Arial";
  ctx.fillText(frame%20<10 ? "🧍‍♂️" : "🚶‍♂️", player.x, player.y);
}

function drawBottles(){
  ctx.font = "26px Arial";
  bottles.forEach(b=>{
    ctx.fillText("🍺", b.x, b.y);
  });
}

function drawWater(){
  ctx.font = "26px Arial";
  water.forEach(w=>{
    ctx.fillText("💧", w.x, w.y);
  });
}

function draw(){
  ctx.clearRect(0,0,420,650);

  applyShake();
  drawBackground();
  drawBottles();
  drawWater();
  drawPlayer();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("gameOverScreen").style.display="none";
  reset();
}

loop();
</script>

</body>
</html>
